name: elaundry                          # ← tambahkan ini, fix project name

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src/elaundry:/var/www/html/elaundry
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app83
    networks:
      - appnet

  app74:
    build:
      context: .
      dockerfile: ./docker/php74/Dockerfile
    image: elaundry-app74               # ← tambahkan ini
    container_name: ${PROJECT_NAME}-php74
    working_dir: /var/www/html/elaundry
    volumes:
      - ./src/elaundry:/var/www/html/elaundry
      - ./docker/php74/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    environment:
      TZ: ${TZ}
      CI_ENV: development
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME_1: ${DB_NAME_1}
      DB_NAME_2: ${DB_NAME_2}
    networks:
      - appnet

  app83:
    build:
      context: .
      dockerfile: ./docker/php83/Dockerfile
    image: elaundry-app83               # ← tambahkan ini
    container_name: ${PROJECT_NAME}-php83
    working_dir: /var/www/html/elaundry
    volumes:
      - ./src/elaundry:/var/www/html/elaundry
      - ./docker/php83/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    environment:
      TZ: ${TZ}
      CI_ENV: development
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME_1: ${DB_NAME_1}
      DB_NAME_2: ${DB_NAME_2}
    networks:
      - appnet

networks:
  appnet:
